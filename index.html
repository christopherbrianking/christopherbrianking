<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christopher Brian King | Design & Illustration</title>
    <style>
        /* Minimalist Reset & Layout System */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #111111;
            padding: 40px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Replicating Your Header Section */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 60px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo a {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: #111111;
            letter-spacing: -0.5px;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 24px;
        }
        nav a {
            text-decoration: none;
            color: #666666;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        nav a:hover, nav a.active {
            color: #111111;
        }

        /* Clean Portfolio Grid */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }
        .portfolio-item {
            background-color: #f9f9f9;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 3 / 4; /* Keeps cover formats looking uniform */
        }
        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }
        .portfolio-item img:hover {
            opacity: 0.9;
        }

        /* Footer Context */
        footer {
            border-top: 1px solid #eeeeee;
            padding-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #888888;
        }
        footer a {
            color: #111111;
            text-decoration: none;
            font-weight: 500;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Site Header -->
    <header>
        <div class="logo">
            <a href="#">Christopher Brian King</a>
        </div>
        <nav>
            <ul>
                <li><a href="#" class="active">Design</a></li>
                <li><a href="https://www.instagram.com/christopherbrianking/" target="_blank">Instagram</a></li>
                <li><a href="mailto:christopherbrianking@gmail.com">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Simplified Grid Showcase -->
    <main class="portfolio-grid">
        <!-- Item 1 -->
        <div class="portfolio-item">
            <img src="thewaytothespring.jpg" alt="The Way to the Spring Book Cover">
        </div>
        <!-- Item 2 -->
        <div class="portfolio-item">
            <img src="Places and Names.jpg" alt="Places and Names Book Cover">
        </div>
        <!-- Item 3 -->
        <div class="portfolio-item">
            <img src="thefirstlovestory.jpg" alt="The First Love Story Book Cover">
        </div>
        <!-- Item 4 -->
        <div class="portfolio-item">
            <img src="The+Heart+of+a+Dog.jpg" alt="The Heart of a Dog Book Cover">
        </div>
        <!-- Item 5 -->
        <div class="portfolio-item">
            <img src="The+Sea+Inside.jpg" alt="The Sea Inside Book Cover">
        </div>
        <!-- Item 6 -->
        <div class="portfolio-item">
            <img src="Thirst.jpg" alt="Thirst Book Cover">
        </div>
    </main>

    <!-- Footer Area -->
    <footer>
        <p>&copy; 2026 Christopher Brian King. Follow on <a href="https://www.instagram.com/christopherbrianking/" target="_blank">Instagram</a>.</p>
    </footer>

</body>
</html>
